[opener]
edit = [{ run = 'nvim "$@"', orphan = false, block = true }]
loupe = [{ run = 'loupe "$@"', orphan = true, block = false }]
ffplay = [{ run = 'ffplay "$@"', orphan = true, block = false }]

[open]
prepend_rules = [
    { url = "*.png", use = [
        "loupe",
    ] },
    { url = "*.jpg", use = [
        "loupe",
    ] },
    { url = "*.jpeg", use = [
        "loupe",
    ] },
    { url = "*.gif", use = [
        "loupe",
    ] },
    { url = "*.mpg", use = [
        "ffplay",
    ] },
    { url = "*.mp4", use = [
        "ffplay",
    ] },
    { url = "*.wmv", use = [
        "ffplay",
    ] },
    { url = "*.mov", use = [
        "ffplay",
    ] },
    { url = "*.avi", use = [
        "ffplay",
    ] },
]
